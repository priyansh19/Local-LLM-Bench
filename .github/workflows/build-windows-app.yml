name: Build Windows App

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Install dependencies
        run: npm install
        working-directory: .

      - name: Build frontend
        run: npm run build
        working-directory: .

      - name: Build Tauri app
        run: npx tauri build
        working-directory: .

      - name: Upload Windows Installer
        uses: actions/upload-artifact@v4
        with:
          name: llm-bench-installer
          path: src-tauri/target/release/bundle/nsis/*.exe
          retention-days: 30

      - name: Create Release
        if: success()
        uses: softprops/action-gh-release@v1
        with:
          files: src-tauri/target/release/bundle/nsis/*.exe
          tag_name: v${{ github.run_number }}
          body: |
            # LLM Bench Windows Application

            Professional benchmarking tool for local LLM models.

            ## Download
            Download the `.exe` installer below and run it.

            ## Features
            - Real-time performance visualization
            - Live system monitoring (CPU, GPU, memory)
            - Professional dark theme dashboard
            - Support for Ollama, LM Studio, llama.cpp models
            - Detailed benchmark metrics
            - No Smart App Control warnings

            ## Installation
            1. Download `LLM_Bench_0.2.0_x64-setup.exe`
            2. Run the installer
            3. Launch from Start Menu

            ## Requirements
            - Windows 10/11
            - Running Ollama/LM Studio instance (optional for local models)
            - ~200MB disk space
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
