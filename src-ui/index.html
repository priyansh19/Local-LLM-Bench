<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LLM Bench - Benchmark Local LLM Models</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, Cantarell, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 12px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
            overflow: hidden;
        }

        .header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            opacity: 0.9;
            font-size: 1.1em;
        }

        .content {
            padding: 40px;
        }

        .section {
            margin-bottom: 40px;
        }

        .section h2 {
            font-size: 1.5em;
            margin-bottom: 20px;
            color: #333;
            border-bottom: 2px solid #667eea;
            padding-bottom: 10px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
        }

        select, input[type="number"] {
            width: 100%;
            padding: 12px;
            border: 2px solid #ddd;
            border-radius: 6px;
            font-size: 1em;
            transition: border-color 0.3s;
        }

        select:focus, input[type="number"]:focus {
            outline: none;
            border-color: #667eea;
        }

        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
        }

        .buttons {
            display: flex;
            gap: 10px;
            margin-top: 30px;
        }

        button {
            flex: 1;
            padding: 14px 20px;
            font-size: 1em;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.3s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.3);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #333;
        }

        .btn-secondary:hover {
            background: #e0e0e0;
        }

        .results {
            background: #f9f9f9;
            padding: 20px;
            border-radius: 6px;
            margin-top: 20px;
            border-left: 4px solid #667eea;
        }

        .results h3 {
            margin-bottom: 15px;
            color: #333;
        }

        .metric {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px solid #eee;
        }

        .metric:last-child {
            border-bottom: none;
        }

        .metric-label {
            color: #666;
        }

        .metric-value {
            font-weight: 600;
            color: #667eea;
        }

        .progress-bar {
            width: 100%;
            height: 8px;
            background: #eee;
            border-radius: 4px;
            overflow: hidden;
            margin: 15px 0;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            width: 0%;
            transition: width 0.3s;
        }

        .status {
            padding: 15px;
            border-radius: 6px;
            margin-top: 15px;
            font-weight: 600;
        }

        .status.success {
            background: #d4edda;
            color: #155724;
            border: 1px solid #c3e6cb;
        }

        .status.error {
            background: #f8d7da;
            color: #721c24;
            border: 1px solid #f5c6cb;
        }

        .status.info {
            background: #d1ecf1;
            color: #0c5460;
            border: 1px solid #bee5eb;
        }

        .export-options {
            display: flex;
            gap: 10px;
            margin-top: 15px;
        }

        .export-options button {
            flex: 1;
        }

        @media (max-width: 600px) {
            .form-row {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8em;
            }

            .buttons {
                flex-direction: column;
            }
        }

        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 20px;
            height: 20px;
            animation: spin 1s linear infinite;
            display: inline-block;
            margin-right: 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🚀 LLM Bench</h1>
            <p>Benchmark Local LLM Models with Professional Analysis</p>
        </div>

        <div class="content">
            <!-- Model Selection -->
            <div class="section">
                <h2>📊 Benchmark Configuration</h2>

                <div class="form-group">
                    <label for="model">Select Model</label>
                    <select id="model">
                        <option value="ollama:mistral">Ollama: Mistral</option>
                        <option value="ollama:neural-chat">Ollama: Neural Chat</option>
                        <option value="ollama:orca">Ollama: Orca</option>
                        <option value="lmstudio:model">LM Studio: Model</option>
                        <option value="llama-cpp:model">llama.cpp: Model</option>
                    </select>
                </div>

                <div class="form-row">
                    <div class="form-group">
                        <label for="iterations">Iterations</label>
                        <input type="number" id="iterations" value="5" min="1" max="100">
                    </div>
                    <div class="form-group">
                        <label for="dataset">Dataset</label>
                        <select id="dataset">
                            <option value="standard">Standard</option>
                            <option value="llama-eval">LLaMA Eval</option>
                            <option value="custom">Custom</option>
                        </select>
                    </div>
                </div>

                <div class="buttons">
                    <button class="btn-primary" onclick="runBenchmark()">
                        ▶️ Start Benchmark
                    </button>
                    <button class="btn-secondary" onclick="clearResults()">
                        🔄 Clear
                    </button>
                </div>
            </div>

            <!-- Progress -->
            <div class="section" id="progressSection" style="display: none;">
                <h2>⏳ Progress</h2>
                <p id="progressText">Starting benchmark...</p>
                <div class="progress-bar">
                    <div class="progress-fill" id="progressFill"></div>
                </div>
            </div>

            <!-- Results -->
            <div class="section" id="resultsSection" style="display: none;">
                <h2>📈 Results</h2>
                <div class="results">
                    <h3>Benchmark Metrics</h3>
                    <div class="metric">
                        <span class="metric-label">Average Latency</span>
                        <span class="metric-value" id="avgLatency">-</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Min Latency</span>
                        <span class="metric-value" id="minLatency">-</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Max Latency</span>
                        <span class="metric-value" id="maxLatency">-</span>
                    </div>
                    <div class="metric">
                        <span class="metric-label">Tokens/Second</span>
                        <span class="metric-value" id="tokensPerSec">-</span>
                    </div>
                </div>

                <div class="export-options">
                    <button class="btn-secondary" onclick="exportResults('json')">
                        💾 JSON
                    </button>
                    <button class="btn-secondary" onclick="exportResults('csv')">
                        📋 CSV
                    </button>
                    <button class="btn-secondary" onclick="exportResults('html')">
                        🌐 HTML
                    </button>
                </div>
            </div>

            <!-- Status -->
            <div id="statusDiv"></div>
        </div>
    </div>

    <script>
        async function runBenchmark() {
            const model = document.getElementById('model').value;
            const iterations = document.getElementById('iterations').value;

            // Show progress
            document.getElementById('progressSection').style.display = 'block';
            document.getElementById('statusDiv').innerHTML = '';

            try {
                // Simulate benchmark (in production, would call Tauri backend)
                for (let i = 0; i <= 100; i += 20) {
                    document.getElementById('progressFill').style.width = i + '%';
                    document.getElementById('progressText').textContent =
                        `Running benchmark: ${i}%`;
                    await new Promise(r => setTimeout(r, 300));
                }

                // Simulate results
                document.getElementById('resultsSection').style.display = 'block';
                document.getElementById('avgLatency').textContent = '1,245.67 ms';
                document.getElementById('minLatency').textContent = '1,100.00 ms';
                document.getElementById('maxLatency').textContent = '1,500.00 ms';
                document.getElementById('tokensPerSec').textContent = '50.5 tokens/s';

                showStatus('Benchmark completed successfully!', 'success');
            } catch (error) {
                showStatus('Error: ' + error, 'error');
            }
        }

        function clearResults() {
            document.getElementById('progressSection').style.display = 'none';
            document.getElementById('resultsSection').style.display = 'none';
            document.getElementById('statusDiv').innerHTML = '';
        }

        async function exportResults(format) {
            showStatus(`Exporting as ${format.toUpperCase()}...`, 'info');
            // In production, would call Tauri backend
            setTimeout(() => {
                showStatus(`Results exported as ${format.toUpperCase()}!`, 'success');
            }, 1000);
        }

        function showStatus(message, type) {
            const statusDiv = document.getElementById('statusDiv');
            statusDiv.innerHTML = `<div class="status ${type}">${message}</div>`;
        }
    </script>
</body>
</html>
